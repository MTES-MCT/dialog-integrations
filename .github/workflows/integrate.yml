name: integrate

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        organization: [co_brest, dp_sarthe, co_nantes, co_rennes, dp_aveyron]
    environment: ${{ matrix.organization }}
    outputs:
      # One output per matrix value — names must be static
      result_co_brest:   ${{ steps.integration.outputs.result_co_brest }}
      result_dp_sarthe:  ${{ steps.integration.outputs.result_dp_sarthe }}
      result_co_nantes:  ${{ steps.integration.outputs.result_co_nantes }}
      result_co_rennes:  ${{ steps.integration.outputs.result_co_rennes }}
      result_dp_aveyron: ${{ steps.integration.outputs.result_dp_aveyron }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: make app:build-ci

      - name: Generate API client
        run: make api:generate-client

      - name: Run integration for ${{ matrix.organization }}
        id: integration
        env:
          DIALOG_BASE_URL: ${{ secrets.DIALOG_BASE_URL }}
          DIALOG_CLIENT_ID: ${{ secrets.DIALOG_CLIENT_ID }}
          DIALOG_CLIENT_SECRET: ${{ secrets.DIALOG_CLIENT_SECRET }}
        # Write a JSON result to the step output named after this org.
        # The || block runs on failure so we still capture a result.
        run: |
          org="${{ matrix.organization }}"
          if uv run dialog integrate "$org"; then
            echo "result_${org}={\"success\":true}"  >> "$GITHUB_OUTPUT"
          else
            echo "result_${org}={\"success\":false}" >> "$GITHUB_OUTPUT"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: integrate
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: make app:build-ci

      - name: Generate API client
        run: make api:generate-client

      - name: Notify Mattermost
        run: |
          uv run dialog notify --results '${{ toJson(needs.integrate.outputs) }}'